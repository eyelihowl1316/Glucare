<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Kami</title>
    <link rel="stylesheet" href="/FrontEnd/assets/navbar.css">
    <link rel="stylesheet" href="/FrontEnd/assets/style.css">
</head>
<body>
    <div id="navbar"></div>
    
    <section class="contact">
        <div class="contact-hero">
            <h1 class="section-title">Hubungi Kami</h1>
            <p>Jika Anda mengalami masalah atau memiliki pertanyaan, silakan isi formulir layanan pelanggan di bawah ini.<br> Kami sangat menghargai keluhan dari pengguna</p>
        </div>

        <div class ="contact-box">
            <h2>Kirimkan Kami Pesan</h2>

            <form id="contactForm">
                <div class="row">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" name="name" placeholder="Name">
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Message</label>
                    <textarea name="message" placeholder="Your Message"></textarea>
                </div>

                <button type="submit" class="btn primary">Kirim Pesan</button>
            </form>
        </div>

        <div id="popup" class ="popup">
            <div class="popup-content">
                <h2 id="popupTittle">Pesan Terkirim!</h2>
                <p id="popupMessage">Terima kasih telah menghubungi kami. Kami akan segera merespons pesan Anda.</p>
                <button onclick="closePopup()">OK</button>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="/FrontEnd/assets/contact.js"></script>
    <script src="/FrontEnd/assets/main.js"></script>
</body>
</html>
